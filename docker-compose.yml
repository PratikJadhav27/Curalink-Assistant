version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: curalink-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

  ai-service:
    build: ./ai-service
    container_name: curalink-ai
    ports:
      - "8000:8000"
    env_file: ./ai-service/.env
    restart: unless-stopped
    depends_on:
      - mongodb

  backend:
    build: ./backend
    container_name: curalink-backend
    ports:
      - "5000:5000"
    env_file: ./backend/.env
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/curalink
      - AI_SERVICE_URL=http://ai-service:8000
    restart: unless-stopped
    depends_on:
      - mongodb
      - ai-service

  frontend:
    build: ./frontend
    container_name: curalink-frontend
    ports:
      - "5173:80"
    restart: unless-stopped
    depends_on:
      - backend

volumes:
  mongo-data:
